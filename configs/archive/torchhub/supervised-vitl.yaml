# Deprecated archived config.
# The original torchhub DINOv3 path is kept only for historical reference.

data:
  image_root: data/raw/csiro-biomass
  image_size: 1024
  black_padding_probability: 0.2
  train_manifest: data/processed/csiro-biomass/metadata/train_wide.parquet
  fold_manifest: data/processed/csiro-biomass/folds/folds_v1.parquet

model:
  backbone_name: dinov3_vitl16
  backbone_source: torchhub
  backbone_repo: facebookresearch/dinov3
  pretrained: true
  backbone_weights: artifacts/pretrained/modelscope/facebook/dinov3-vitl16-pretrain-lvd1689m/dinov3_vitl16_pretrain_lvd1689m-8aa4cbdd.pth
  backbone_check_hash: false
  fusion_dim: 1024
  trunk_dim: 1024
  num_attention_heads: 8
  dropout: 0.1

train:
  output_dir: artifacts/supervised/vitl_fold0_seed42
  valid_fold: 0
  seed: 42
  batch_size: 8
  num_workers: 8
  amp: true
  cls_weight: 0.3
  stages:
    - freeze_backbone: true
      optimizer:
        name: adamw
        lr: 2.0e-4
        weight_decay: 1.0e-4
      scheduler:
        name: cosine
        epochs: 3
        warmup_steps: 10
    - freeze_backbone: false
      optimizer:
        name: adamw
        lr: 5.0e-5
        weight_decay: 1.0e-4
      scheduler:
        name: cosine
        epochs: 8
        warmup_steps: 20
